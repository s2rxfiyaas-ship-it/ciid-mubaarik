<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ciid Mubaarak - Hambalyo</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: {
                            300: '#FDE047',
                            400: '#FACC15',
                            500: '#EAB308',
                            600: '#CA8A04',
                        },
                        darkblue: {
                            900: '#0F172A',
                            950: '#020617',
                        }
                    },
                    fontFamily: {
                        'amiri': ['Amiri', 'serif'],
                        'poppins': ['Poppins', 'sans-serif'],
                    },
                    animation: {
                        'swing': 'swing 3s ease-in-out infinite alternate',
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        swing: {
                            '0%': { transform: 'rotate(5deg)', transformOrigin: 'top center' },
                            '100%': { transform: 'rotate(-5deg)', transformOrigin: 'top center' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            overflow: hidden; /* Ka hortagga scroll-ka sababtoo ah canvas-ka */
            background: linear-gradient(135deg, #020617 0%, #0F172A 50%, #064E3B 100%);
            color: white;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 40px rgba(234, 179, 8, 0.1);
        }
        #particles-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        .lantern-cord {
            width: 2px;
            height: 50px;
            background: linear-gradient(to bottom, rgba(255,215,0,0.8), rgba(255,215,0,0.2));
            margin: 0 auto;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center font-poppins relative">

    <!-- Canvas for Stars Background -->
    <canvas id="particles-canvas"></canvas>

    <!-- Hanging Lanterns (Faynuusyo lulanaya) -->
    <div class="absolute top-0 left-10 md:left-32 animate-swing hidden sm:block">
        <div class="lantern-cord h-16 md:h-32"></div>
        <svg width="40" height="70" viewBox="0 0 24 40" fill="none" xmlns="http://www.w3.org/2000/svg" class="text-gold-400 drop-shadow-[0_0_15px_rgba(250,204,21,0.6)]">
            <path d="M12 2L15 8H9L12 2Z" fill="currentColor"/>
            <rect x="7" y="9" width="10" height="4" rx="1" fill="currentColor"/>
            <path d="M6 14L5 28H19L18 14H6Z" fill="rgba(250,204,21,0.2)" stroke="currentColor" stroke-width="1.5"/>
            <path d="M12 14V28" stroke="currentColor" stroke-width="1.5"/>
            <path d="M8 14L8 28" stroke="currentColor" stroke-width="0.5"/>
            <path d="M16 14L16 28" stroke="currentColor" stroke-width="0.5"/>
            <rect x="5" y="29" width="14" height="4" rx="1" fill="currentColor"/>
            <path d="M9 34L15 34L13 38H11L9 34Z" fill="currentColor"/>
        </svg>
    </div>

    <div class="absolute top-0 right-10 md:right-32 animate-swing" style="animation-delay: 1.5s;">
        <div class="lantern-cord h-10 md:h-20"></div>
        <svg width="30" height="50" viewBox="0 0 24 40" fill="none" xmlns="http://www.w3.org/2000/svg" class="text-gold-400 drop-shadow-[0_0_10px_rgba(250,204,21,0.5)]">
            <path d="M12 2L15 8H9L12 2Z" fill="currentColor"/>
            <rect x="7" y="9" width="10" height="4" rx="1" fill="currentColor"/>
            <path d="M6 14L5 28H19L18 14H6Z" fill="rgba(250,204,21,0.2)" stroke="currentColor" stroke-width="1.5"/>
            <path d="M12 14V28" stroke="currentColor" stroke-width="1.5"/>
            <rect x="5" y="29" width="14" height="4" rx="1" fill="currentColor"/>
            <path d="M9 34L15 34L13 38H11L9 34Z" fill="currentColor"/>
        </svg>
    </div>

    <!-- Main Content Card -->
    <div class="relative z-10 w-11/12 max-w-2xl p-8 md:p-12 glass-card rounded-3xl text-center animate-float">
        
        <!-- Sawirka Ciidda -->
        <div class="flex justify-center mb-8">
            <img src="https://images.unsplash.com/photo-1584269600464-37b1b58a9fe7?q=80&w=800&auto=format&fit=crop" alt="" class="w-full h-48 md:h-64 object-cover rounded-2xl border border-gold-500/30 shadow-[0_0_20px_rgba(250,204,21,0.3)]">
        </div>

        <!-- Headings -->
        <h1 class="font-amiri text-5xl md:text-7xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-gold-300 via-gold-400 to-yellow-600 mb-2 leading-tight mt-4">
            عيد مبارك
        </h1>
        <h2 class="text-3xl md:text-4xl font-amiri text-gold-300 mb-6 tracking-wide">
            Habeen Wacan oo Ciid ah
        </h2>

        <!-- Separator -->
        <div class="flex items-center justify-center gap-4 mb-8 opacity-70">
            <div class="h-px w-16 bg-gradient-to-r from-transparent to-gold-400"></div>
            <div class="w-2 h-2 rounded-full bg-gold-400 transform rotate-45"></div>
            <div class="h-px w-16 bg-gradient-to-l from-transparent to-gold-400"></div>
        </div>

        <!-- Message -->
        <p class="text-gray-200 text-lg md:text-xl leading-relaxed mb-8 font-light max-w-lg mx-auto">
            Maalmihii soonka waa la soo dhaafay, caawana waa habeenkii farxadda ee Ciidda! Waxaan kuu rajaynayaa adiga iyo qoyskaaga habeen iyo ciid ay ka buuxdo nabad iyo barwaaqo.
        </p>

        <!-- Sender / Footer -->
        <div class="inline-block px-8 py-3 rounded-full border border-gold-500/30 bg-gold-500/10 backdrop-blur-sm text-gold-300 font-medium text-lg cursor-pointer hover:bg-gold-500/20 transition-all duration-300">
            Kullu Caam wa Antum Bikheyr ✨
            <div class="mt-2 text-sm text-gray-300 italic font-light">
                Ka: <span class="text-white font-medium">[Gali Magacaaga Halkan]</span>
            </div>
        </div>

    </div>

    <!-- JavaScript for Background Particles (Stars) -->
    <script>
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');

        let particlesArray;

        // Set canvas size
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Resize canvas on window resize
        window.addEventListener('resize', function() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        });

        // Particle class
        class Particle {
            constructor(x, y, directionX, directionY, size, color) {
                this.x = x;
                this.y = y;
                this.directionX = directionX;
                this.directionY = directionY;
                this.size = size;
                this.color = color;
                // Add a random blink speed
                this.blinkSpeed = Math.random() * 0.02 + 0.005;
                this.opacity = Math.random();
                this.fadeDirection = 1;
            }

            // Draw particle
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                // Create glowing effect
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fillStyle = `rgba(250, 204, 21, ${this.opacity})`; // Gold color with dynamic opacity
                ctx.fill();
                ctx.shadowBlur = 0; // Reset shadow
            }

            // Update particle position and opacity
            update() {
                if (this.x > canvas.width || this.x < 0) {
                    this.directionX = -this.directionX;
                }
                if (this.y > canvas.height || this.y < 0) {
                    this.directionY = -this.directionY;
                }

                this.x += this.directionX;
                this.y += this.directionY;

                // Blinking effect
                this.opacity += this.blinkSpeed * this.fadeDirection;
                if(this.opacity >= 1) {
                    this.fadeDirection = -1;
                } else if(this.opacity <= 0.1) {
                    this.fadeDirection = 1;
                }

                this.draw();
            }
        }

        // Initialize particles
        function init() {
            particlesArray = [];
            let numberOfParticles = (canvas.height * canvas.width) / 10000;
            
            // Limit max particles for performance
            if (numberOfParticles > 150) numberOfParticles = 150;

            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2) + 0.5;
                let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                let directionX = (Math.random() * 0.4) - 0.2; // Very slow movement
                let directionY = (Math.random() * 0.4) - 0.2;
                let color = '#FACC15'; // Gold

                particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
            }
        }

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, innerWidth, innerHeight);

            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
        }

        init();
        animate();
    </script>
</body>
</html>
